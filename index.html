<style>
.et-wrap { font-family: 'Proxima', sans-serif; overflow-x: auto; margin: 2em 0; }
.et-wrap table { width: 100%; border-collapse: collapse; min-width: 620px; }
.et-wrap thead th {
  background: #BDD7EE;
  color: #1F4E79;
  font-family: 'Proxima Nova', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 10px 12px;
  text-align: left;
  border: 1px solid #9ab8d4;
}
.et-wrap td {
  border: 1px solid #ccc;
  padding: 0;
  height: 36px;
}
.et-wrap td input[type="text"],
.et-wrap td input[type="date"] {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  padding: 0 8px;
  font-family: 'Times', serif;
  font-size: 16px;
  color: #2226
  box-sizing: border-box;
  outline: none;
}
.et-wrap td input[type="text"]:focus,
.et-wrap td input[type="date"]:focus {
  background: #EBF4FB;
}
.et-wrap td select {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  padding: 0 6px;
  font-family: 'Times', serif;
  font-size: 16px;
  color: #222;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  box-sizing: border-box;
}
.et-wrap tr:nth-child(even) td { background: #f9f9f9; }
.et-wrap tr:hover td { background: #f0f6fb !important; }
/* Status colors */
.et-status-inprogress { background: #f4cccc !important; }
.et-status-submitted  { background: #FCE4D6 !important; }
.et-status-accepted   { background: #E2EFDA !important; }
/* Upload colors */
.et-upload-yes { background: #E2EFDA !important; }
.et-upload-no  { background: #f4cccc !important; }
/* Column widths */
.et-col-page   { width: 60px; }
.et-col-topic  { width: 200px; }
.et-col-editor { width: 150px; }
.et-col-date   { width: 120px; }
.et-col-status { width: 160px; }
.et-col-upload { width: 110px; }
.et-col-notes  { }
</style>

 <script>
const API_URL = "PASTE_YOUR_SCRIPT_URL_HERE";

let tableData = [];

async function fetchData() {
  const res = await fetch(API_URL);
  return await res.json();
}

async function saveRow(id, row) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ id, row })
  });
  return await res.json();
}

(function() {
  var rows = 16;
  var tbody = document.getElementById('et-body');

  function statusClass(v) {
    if (v === 'In progress') return 'et-status-inprogress';
    if (v === 'Submitted') return 'et-status-submitted';
    if (v === 'Accepted by Jenkins') return 'et-status-accepted';
    return '';
  }

  function uploadClass(v) {
    if (v === 'Yes') return 'et-upload-yes';
    if (v === 'No') return 'et-upload-no';
    return '';
  }

  function createRow(rowData = []) {
    const tr = document.createElement('tr');
    let rowId = rowData[0] || null;

    function handleChange() {
      const values = Array.from(tr.querySelectorAll('input, select')).map(el => el.value);

      saveRow(rowId, values).then(res => {
        if (!rowId && res.id) rowId = res.id;
      });
    }

    function makeInput(type, value) {
      const td = document.createElement('td');
      const input = document.createElement('input');
      input.type = type;
      input.value = value || '';
      input.addEventListener('change', handleChange);
      td.appendChild(input);
      return td;
    }

    function makeSelect(options, classFn, value) {
      const td = document.createElement('td');
      const sel = document.createElement('select');

      options.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o;
        opt.textContent = o;
        sel.appendChild(opt);
      });

      sel.value = value || '';
      td.className = classFn(sel.value);

      sel.addEventListener('change', () => {
        td.className = classFn(sel.value);
        handleChange();
      });

      td.appendChild(sel);
      return td;
    }

    tr.appendChild(makeInput('text', rowData[1]));
    tr.appendChild(makeInput('text', rowData[2]));
    tr.appendChild(makeInput('text', rowData[3]));
    tr.appendChild(makeInput('date', rowData[4]));
    tr.appendChild(makeSelect(['', 'In progress', 'Submitted', 'Accepted by Jenkins'], statusClass, rowData[5]));
    tr.appendChild(makeSelect(['', 'Yes', 'No'], uploadClass, rowData[6]));
    tr.appendChild(makeInput('text', rowData[7]));

    return tr;
  }

  function render(data) {
    tbody.innerHTML = '';
    data.slice(1).forEach(row => {
      tbody.appendChild(createRow(row));
    });

    for (let i = data.length - 1; i < rows; i++) {
      tbody.appendChild(createRow());
    }
  }

  async function refresh() {
    const newData = await fetchData();
    const newString = JSON.stringify(newData);

    if (newString !== JSON.stringify(tableData)) {
      tableData = newData;
      render(newData);
    }
  }

  // Initial load
  refresh();

  // Poll every 5 seconds
  setInterval(refresh, 5000);
})();
</script>
