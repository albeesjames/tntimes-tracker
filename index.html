<style>
.et-wrap { font-family: 'Proxima', sans-serif; overflow-x: auto; margin: 2em 0; }
.et-wrap table { width: 100%; border-collapse: collapse; min-width: 620px; }
.et-wrap thead th {
  background: #BDD7EE;
  color: #1F4E79;
  font-family: 'Proxima Nova', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 10px 12px;
  text-align: left;
  border: 1px solid #9ab8d4;
}
.et-wrap td {
  border: 1px solid #ccc;
  padding: 0;
  height: 36px;
}
.et-wrap td input[type="text"],
.et-wrap td input[type="date"] {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  padding: 0 8px;
  font-family: 'Times', serif;
  font-size: 16px;
  color: #2226
  box-sizing: border-box;
  outline: none;
}
.et-wrap td input[type="text"]:focus,
.et-wrap td input[type="date"]:focus {
  background: #EBF4FB;
}
.et-wrap td select {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  padding: 0 6px;
  font-family: 'Times', serif;
  font-size: 16px;
  color: #222;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  box-sizing: border-box;
}
.et-wrap tr:nth-child(even) td { background: #f9f9f9; }
.et-wrap tr:hover td { background: #f0f6fb !important; }
/* Status colors */
.et-status-inprogress { background: #f4cccc !important; }
.et-status-submitted  { background: #FCE4D6 !important; }
.et-status-accepted   { background: #E2EFDA !important; }
/* Upload colors */
.et-upload-yes { background: #E2EFDA !important; }
.et-upload-no  { background: #f4cccc !important; }
/* Column widths */
.et-col-page   { width: 60px; }
.et-col-topic  { width: 200px; }
.et-col-editor { width: 150px; }
.et-col-date   { width: 120px; }
.et-col-status { width: 160px; }
.et-col-upload { width: 110px; }
.et-col-notes  { }
</style>
 
<div class="et-wrap">
  <table id="et-table">
    <colgroup>
      <col class="et-col-page">
      <col class="et-col-topic">
      <col class="et-col-editor">
      <col class="et-col-date">
      <col class="et-col-status">
      <col class="et-col-upload">
      <col class="et-col-notes">
    </colgroup>
    <thead>
      <tr>
        <th>Page</th>
        <th>Topic</th>
        <th>Editor</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Uploaded?</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="et-body"></tbody>
  </table>
</div>
 
<script>
(function() {
  var rows = 16;
  var tbody = document.getElementById('et-body');
 
  function statusClass(v) {
    if (v === 'In progress') return 'et-status-inprogress';
    if (v === 'Submitted')   return 'et-status-submitted';
    if (v === 'Accepted by Jenkins') return 'et-status-accepted';
    return '';
  }
  function uploadClass(v) {
    if (v === 'Yes') return 'et-upload-yes';
    if (v === 'No')  return 'et-upload-no';
    return '';
  }
 
  function makeInput(type) {
    var td = document.createElement('td');
    var inp = document.createElement('input');
    inp.type = type || 'text';
    td.appendChild(inp);
    return td;
  }
 
  function makeSelect(options, classFn) {
    var td = document.createElement('td');
    var sel = document.createElement('select');
    options.forEach(function(o) {
      var opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', function() {
      td.className = classFn(sel.value);
    });
    td.appendChild(sel);
    return td;
  }
 
  for (var i = 0; i < rows; i++) {
    var tr = document.createElement('tr');
    tr.appendChild(makeInput('text'));
    tr.appendChild(makeInput('text'));
    tr.appendChild(makeInput('text'));
    tr.appendChild(makeInput('date'));
    tr.appendChild(makeSelect(['', 'In progress', 'Submitted', 'Accepted by Jenkins'], statusClass));
    tr.appendChild(makeSelect(['', 'Yes', 'No'], uploadClass));
    tr.appendChild(makeInput('text'));
    tbody.appendChild(tr);
  }
})();
</script>
