<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxF10slx1yRJm9AfENsDxzWiTASkfcI3zTWg09faLC-2Vaxk9qqqqV51FlJzp759o6b/exec";

async function loadData() {
  const res = await fetch(API_URL);
  return await res.json();
}

async function saveData(data) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });
}

(function() {
  var rows = 16;
  var tbody = document.getElementById('et-body');

  function statusClass(v) {
    if (v === 'In progress') return 'et-status-inprogress';
    if (v === 'Submitted') return 'et-status-submitted';
    if (v === 'Accepted by Jenkins') return 'et-status-accepted';
    return '';
  }

  function uploadClass(v) {
    if (v === 'Yes') return 'et-upload-yes';
    if (v === 'No') return 'et-upload-no';
    return '';
  }

  function getTableData() {
    let data = [];
    document.querySelectorAll('#et-body tr').forEach(tr => {
      let row = [];
      tr.querySelectorAll('input, select').forEach(el => {
        row.push(el.value);
      });
      data.push(row);
    });
    return data;
  }

  function attachSave(el) {
    el.addEventListener('change', () => {
      saveData(getTableData());
    });
  }

  function makeInput(type, value) {
    var td = document.createElement('td');
    var inp = document.createElement('input');
    inp.type = type || 'text';
    inp.value = value || '';
    attachSave(inp);
    td.appendChild(inp);
    return td;
  }

  function makeSelect(options, classFn, value) {
    var td = document.createElement('td');
    var sel = document.createElement('select');

    options.forEach(function(o) {
      var opt = document.createElement('option');
      opt.value = o;
      opt.textContent = o;
      sel.appendChild(opt);
    });

    sel.value = value || '';
    td.className = classFn(sel.value);

    sel.addEventListener('change', function() {
      td.className = classFn(sel.value);
      saveData(getTableData());
    });

    td.appendChild(sel);
    return td;
  }

  loadData().then(data => {
    data.shift(); // remove header row

    for (var i = 0; i < rows; i++) {
      var tr = document.createElement('tr');
      var rowData = data[i] || [];

      tr.appendChild(makeInput('text', rowData[0]));
      tr.appendChild(makeInput('text', rowData[1]));
      tr.appendChild(makeInput('text', rowData[2]));
      tr.appendChild(makeInput('date', rowData[3]));
      tr.appendChild(makeSelect(['', 'In progress', 'Submitted', 'Accepted by Jenkins'], statusClass, rowData[4]));
      tr.appendChild(makeSelect(['', 'Yes', 'No'], uploadClass, rowData[5]));
      tr.appendChild(makeInput('text', rowData[6]));

      tbody.appendChild(tr);
    }
  });
})();
</script>
