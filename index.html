<style>
.et-wrap { font-family: 'Proxima', sans-serif; overflow-x: auto; margin: 2em 0; }
.et-wrap table { width: 100%; border-collapse: collapse; min-width: 620px; }
.et-wrap thead th {
  background: #BDD7EE;
  color: #1F4E79;
  font-family: 'Proxima Nova', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 10px 12px;
  text-align: left;
  border: 1px solid #9ab8d4;
}
.et-wrap td {
  border: 1px solid #ccc;
  padding: 0;
  height: 36px;
}
.et-wrap td input[type="text"],
.et-wrap td input[type="date"] {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  padding: 0 8px;
  font-family: 'Times', serif;
  font-size: 16px;
  color: #2226;
  box-sizing: border-box;
  outline: none;
}
.et-wrap td input[type="text"]:focus,
.et-wrap td input[type="date"]:focus {
  background: #EBF4FB;
}
.et-wrap td select {
  width: 100%;
  height: 100%;
  border: none;
  background: transparent;
  padding: 0 6px;
  font-family: 'Times', serif;
  font-size: 16px;
  color: #222;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  box-sizing: border-box;
}
.et-wrap tr:nth-child(even) td { background: #f9f9f9; }
.et-wrap tr:hover td { background: #f0f6fb !important; }
/* Status colors */
.et-status-inprogress { background: #f4cccc !important; }
.et-status-submitted  { background: #FCE4D6 !important; }
.et-status-accepted   { background: #E2EFDA !important; }
/* Upload colors */
.et-upload-yes { background: #E2EFDA !important; }
.et-upload-no  { background: #f4cccc !important; }
/* Column widths */
.et-col-page   { width: 60px; }
.et-col-topic  { width: 200px; }
.et-col-editor { width: 150px; }
.et-col-date   { width: 120px; }
.et-col-status { width: 160px; }
.et-col-upload { width: 110px; }
.et-col-notes  { }
.et-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 1.5em 0;
  font-family: 'Proxima', sans-serif;
  font-size: 24px;
  font-weight: 600;
  color: #1F4E79;
}

.et-header input {
  border: none;
  border-bottom: none;
  font-size: 24px;
  padding: 2px 6px;
  margin-left: 6px;
  outline: none;
  background: transparent;
  font-family: inherit;
}

.et-header input:focus {
  background: #EBF4FB;
}

th.asc::after {
  content: " ▲";
  font-size: 14px;
}

th.desc::after {
  content: " ▼";
  font-size: 14px;
}
  
</style>

<div class="et-header">
  <div class="et-issue">
    Issue <input id="issueInput" type="text" value="01" />
  </div>

  <div class="et-printdate">
    Print Date:
    <input id="printDateInput" type="date" />
  </div>
</div>

<div class="et-wrap">
  <table id="et-table">
    <colgroup>
      <col class="et-col-page">
      <col class="et-col-topic">
      <col class="et-col-editor">
      <col class="et-col-date">
      <col class="et-col-status">
      <col class="et-col-upload">
      <col class="et-col-notes">
    </colgroup>
    <thead>
      <tr>
        <th>Page</th>
        <th>Topic</th>
        <th>Editor</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Uploaded?</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="et-body"></tbody>
  </table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzjFoeo0Uhx3OfsgmSgtz64izDf_wpBPDCq_aHjrelxyzcBaCKL4ID9jsKkw23JYAqC/exec";

let tableData = [];

let isEditing = false;
  
async function fetchData() {
  const res = await fetch(API_URL);
  return await res.json();
}

async function saveRow(id, row) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ id, row })
  });
  return await res.json();
}

let sortState = {
  col: null,
  asc: true
};

 function enableSorting() {
  const headers = document.querySelectorAll('#et-table thead th');

  // clear existing arrow classes
  headers.forEach(h => h.classList.remove('asc', 'desc'));

  // restore current sort arrow
  if (sortState.col !== null) {
    headers[sortState.col].classList.add(
      sortState.asc ? 'asc' : 'desc'
    );
  }

  headers.forEach((th, index) => {
    th.style.cursor = 'pointer';

    th.onclick = () => {
      if (sortState.col === index) {
        sortState.asc = !sortState.asc;
      } else {
        sortState.col = index;
        sortState.asc = true;
      }

      tableData = sortData(tableData, index + 1, sortState.asc);
      render(tableData);

      // reapply arrows after render
      enableSorting();
    };
  });
}

  function sortData(data, colIndex, asc) {
  return [...data].sort((a, b) => {
    let v1 = a[colIndex] || '';
    let v2 = b[colIndex] || '';

    // Handle dates
    if (typeof v1 === 'string' && v1.includes('-'))
      v1 = new Date(v1);
      v2 = new Date(v2);
    }

    // Handle numbers (Page column if numeric)
    if (!isNaN(v1) && !isNaN(v2)) {
      v1 = Number(v1);
      v2 = Number(v2);
    } else {
      v1 = v1.toString().toLowerCase();
      v2 = v2.toString().toLowerCase();
    }

    if (v1 < v2) return asc ? -1 : 1;
    if (v1 > v2) return asc ? 1 : -1;
    return 0;
  });
}
  
(function() {
  var rows = 18;
  var tbody = document.getElementById('et-body');

  function statusClass(v) {
    if (v === 'In progress') return 'et-status-inprogress';
    if (v === 'Submitted') return 'et-status-submitted';
    if (v === 'Accepted by Jenkins') return 'et-status-accepted';
    return '';
  }

  function uploadClass(v) {
    if (v === 'Yes') return 'et-upload-yes';
    if (v === 'No') return 'et-upload-no';
    return '';
  }

  function createRow(rowData = []) {
    const tr = document.createElement('tr');
    let rowId = rowData[0] || null;

    function handleChange() {
      const values = Array.from(tr.querySelectorAll('input, select')).map(el => el.value);

      saveRow(rowId, values).then(res => {
        if (!rowId && res.id) rowId = res.id;
      });
    }

    function makeInput(type, value) {
      const td = document.createElement('td');
      const input = document.createElement('input');
      input.type = type;
      input.value = value || '';
      input.addEventListener('change', handleChange);
            input.addEventListener('focus', () => isEditing = true);
input.addEventListener('blur', () => isEditing = false);
      td.appendChild(input);
      return td;

    }

    function makeSelect(options, classFn, value) {
      const td = document.createElement('td');
      const sel = document.createElement('select');

      options.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o;
        opt.textContent = o;
        sel.appendChild(opt);
      });

              sel.addEventListener('focus', () => isEditing = true);
sel.addEventListener('blur', () => isEditing = false);
      sel.value = value || '';
      td.className = classFn(sel.value);

      sel.addEventListener('change', () => {
        td.className = classFn(sel.value);
        handleChange();
      });

      td.appendChild(sel);
      return td;
    }

    tr.appendChild(makeInput('text', rowData[1]));
    tr.appendChild(makeInput('text', rowData[2]));
    tr.appendChild(makeInput('text', rowData[3]));
    tr.appendChild(makeInput('date', rowData[4]));
    tr.appendChild(makeSelect(['', 'In progress', 'Submitted', 'Accepted by Jenkins'], statusClass, rowData[5]));
    tr.appendChild(makeSelect(['', 'Yes', 'No'], uploadClass, rowData[6]));
    tr.appendChild(makeInput('text', rowData[7]));

    return tr;
  }

  function render(data) {
    tbody.innerHTML = '';
    data.slice(1).forEach(row => {
      tbody.appendChild(createRow(row));
    });

    for (let i = data.length - 1; i < rows; i++) {
      tbody.appendChild(createRow());
    }
  }

async function saveMeta(issue, printDate) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      meta: { issue, printDate }
    })
  });
}

function updateHeaderUI(meta) {
  document.getElementById('issueInput').value = meta.issue || '';
  document.getElementById('printDateInput').value = meta.printDate || '';
}
  
async function refresh() {
  const res = await fetch(API_URL);
  const data = await res.json();

  if (isEditing) return;
  
  // Update header
  updateHeaderUI(data.meta);

  const newRows = data.rows;
  const newString = JSON.stringify(newRows);

  if (newString !== JSON.stringify(tableData)) {
    tableData = newRows;

if (sortState.col !== null) {
  tableData = sortData(tableData, sortState.col + 1, sortState.asc);
}

render(tableData);
enableSorting();
  }
}
  
document.getElementById('issueInput').addEventListener('input', () => {
  saveMeta(
    document.getElementById('issueInput').value,
    document.getElementById('printDateInput').value
  );
});

document.getElementById('printDateInput').addEventListener('change', () => {
  saveMeta(
    document.getElementById('issueInput').value,
    document.getElementById('printDateInput').value
  );
});
  
  // Initial load
  refresh();
  
})();
</script>
